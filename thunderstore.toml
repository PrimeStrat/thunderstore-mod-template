# Thunderstore CLI config. Used by `tcli publish`.
# Install tcli once: dotnet tool install --global tcli
# Publish: pwsh ./scripts/publish.ps1   (or)   tcli publish --file dist/<author>-<mod>-<version>.zip

config-version = "0.0.0"

[package]
namespace      = "YourName"
name           = "MyMod"
versionNumber  = "0.1.0"
description    = "A BepInEx mod built from the Thunderstore mod template."
websiteUrl     = "https://github.com/YourName/MyMod"
containsNsfwContent = false

[[package.dependencies]]
# Reference dependencies as "Namespace-Name-Version".
# Default: BepInEx 5.4.21 pack.
# name = "BepInEx-BepInExPack-5.4.2100"

[build]
icon       = "thunderstore/icon.png"
readme     = "thunderstore/README.md"
outdir     = "dist"

[[build.copy]]
source = "build/package/plugins"
target = "plugins"

[publish]
# The community/game slug on Thunderstore (e.g. "lethal-company", "valheim", "risk-of-rain-2").
community = "REPLACE_ME"
repository = "https://thunderstore.io"
categories = []
